<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>star-crew-64 · tools</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { display: flex; flex-direction: column;
         font-family: system-ui, -apple-system, Segoe UI, sans-serif;
         background: #1a1b22; color: #ddd; overflow: hidden; }

  #tabs { display: flex; background: #22232c; border-bottom: 1px solid #333;
          flex-shrink: 0; }
  #tabs .tab { padding: 10px 18px; cursor: pointer; font-size: 13px;
               color: #aaa; border: none; background: transparent;
               border-bottom: 2px solid transparent; font-family: inherit; }
  #tabs .tab:hover { color: #ddd; }
  #tabs .tab.active { color: #cfe; border-bottom-color: #4e9d7c;
                      background: #2c5a4a; }
  #tabs .brand { margin-left: auto; padding: 10px 18px; font-size: 11px;
                 letter-spacing: 1.5px; text-transform: uppercase;
                 color: #8af; align-self: center; }

  #frames { flex: 1; position: relative; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%;
           border: 0; display: none; background: #0d0e14; }
  iframe.active { display: block; }
</style>
</head>
<body>
  <nav id="tabs">
    <button class="tab active" data-target="level">Level editor</button>
    <button class="tab" data-target="model">Model editor</button>
    <span class="brand">star-crew-64</span>
  </nav>
  <div id="frames">
    <iframe id="frame-level" class="active" src="level-editor/"></iframe>
    <iframe id="frame-model" src="about:blank" data-src="model-editor/"></iframe>
  </div>
  <script>
    const tabs = document.querySelectorAll('#tabs .tab');
    const frames = {
      level: document.getElementById('frame-level'),
      model: document.getElementById('frame-model'),
    };

    function activate(name) {
      for (const tab of tabs) tab.classList.toggle('active', tab.dataset.target === name);
      for (const [key, frame] of Object.entries(frames)) {
        frame.classList.toggle('active', key === name);
      }
      // Lazy-load iframes the first time their tab is opened.
      const frame = frames[name];
      if (frame.dataset.src && frame.src === 'about:blank') {
        frame.src = frame.dataset.src;
      }
      if (location.hash.slice(1) !== name) location.hash = name;
    }

    for (const tab of tabs) {
      tab.addEventListener('click', () => activate(tab.dataset.target));
    }

    const initial = location.hash.slice(1);
    if (initial in frames) activate(initial);
  </script>
</body>
</html>
