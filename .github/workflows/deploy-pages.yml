name: Build Game + Emulator and Deploy to GitHub Pages

# Runs on every push to any branch (as requested) and on manual dispatch.
# The build job always runs; the deploy job publishes to GitHub Pages.
on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-game:
    name: Build N64 ROM (libdragon + tiny3d)
    runs-on: ubuntu-latest
    outputs:
      rom-artifact: star-crew-64-rom
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ROM in libdragon container
        # `ghcr.io/dragonminded/libdragon` only ships the MIPS cross toolchain
        # (at /n64_toolchain). It does NOT contain libdragon itself or tiny3d.
        # So inside the container we:
        #   1. clone + install libdragon (preview branch, required by tiny3d)
        #      and its tools (mksprite, audioconv64, etc. used by our Makefile)
        #   2. clone + build tiny3d (libt3d.a is linked directly from its tree)
        #   3. build the game ROM
        # Cache key the libdragon SHA so reruns reuse the prebuilt toolchain.
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/dragonminded/libdragon:latest
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            set -e
            # Pin libdragon to the commit right before `display_init`
            # switched from plain memset() to sys_hw_memset() for
            # framebuffer clears (libdragon 79f3dcc, 2026-03-15).
            # sys_hw_memset requires MI repeat mode, which the rubens-ares
            # WASM emulator doesn't implement (ares/.../mi/io.cpp:60 marks
            # initializeMode=1 as `unimplemented`), so any libdragon newer
            # than this asserts at boot on our emulator.
            LIBDRAGON_SHA=25165e1d209118096edd4eb9a54b6ee5e4c22342
            if [ ! -f /n64_toolchain/include/n64.mk ]; then
              git clone https://github.com/DragonMinded/libdragon.git /tmp/libdragon
              git -C /tmp/libdragon checkout "$LIBDRAGON_SHA"
              make -C /tmp/libdragon -j"$(nproc)"
              make -C /tmp/libdragon install
              make -C /tmp/libdragon tools -j"$(nproc)"
              make -C /tmp/libdragon tools-install
            fi
            if [ ! -d tiny3d ]; then
              git clone --depth 1 https://github.com/HailToDodongo/tiny3d.git
            fi
            # Only build the core library (produces tiny3d/build/libt3d.a);
            # tiny3d's build.sh also rebuilds every example + tool, which we
            # don't need. t3d.mk links libt3d.a directly from the source tree.
            make -C tiny3d -j"$(nproc)"
            make -j"$(nproc)"
            ls -la star-crew-64.z64

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: star-crew-64-rom
          path: star-crew-64.z64
          if-no-files-found: error
          retention-days: 7

  build-emulator:
    name: Build ares WASM (from emulator submodule)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Verify emscripten
        run: emcc --version

      - name: Prepare emulator build tree
        # Mirrors emulator/.github/workflows/deploy-pages.yml from rubens-ares:
        # stage a build/ dir by copying ares/ + applying wasm-patches/ on top.
        working-directory: emulator
        run: |
          set -e
          mkdir -p build
          cp -r ares/ares build/
          cp -r ares/nall build/
          cp -r ares/libco build/
          cp -r ares/ruby build/
          cp -r ares/hiro build/
          cp -r ares/mia build/
          cp -r ares/thirdparty build/
          [ -d ares/scripts ] && cp -r ares/scripts build/ || true
          mkdir -p build/web-ui
          cp -a wasm-patches/. build/
          cp "ares/ares/System/Nintendo 64/pif.ntsc.rom" build/web-ui/
          cp "ares/ares/System/Nintendo 64/pif.pal.rom"  build/web-ui/
          find build -name '*.cpp' -exec touch {} +
          find build -name '*.hpp' -exec touch {} +
          touch build/LICENSE

      - name: Build WASM
        working-directory: emulator/build/web-ui
        run: emmake make -j"$(nproc)" wasm32=true platform=linux

      - name: Verify build artifacts
        run: |
          ls -la emulator/build/web-ui/out/
          test -f emulator/build/web-ui/out/ares
          test -f emulator/build/web-ui/out/ares.wasm
          test -f emulator/build/web-ui/out/ares.data

      - name: Stage emulator artifact (flat)
        # Stage into a single flat dir so the artifact layout is predictable;
        # upload-artifact@v4 strips the least-common-ancestor from multi-path
        # uploads, which makes downstream paths fragile.
        run: |
          mkdir -p emu-dist
          cp emulator/web/index.html            emu-dist/index.html
          cp emulator/web/coi-serviceworker.js  emu-dist/coi-serviceworker.js
          cp emulator/build/web-ui/out/ares     emu-dist/ares.js
          cp emulator/build/web-ui/out/ares.wasm emu-dist/ares.wasm
          cp emulator/build/web-ui/out/ares.data emu-dist/ares.data
          ls -la emu-dist/

      - name: Upload emulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ares-wasm
          path: emu-dist
          if-no-files-found: error
          retention-days: 7

  package-site:
    name: Stage GitHub Pages site
    runs-on: ubuntu-latest
    needs: [build-game, build-emulator]
    steps:
      - name: Checkout repo (for web-overlay/)
        uses: actions/checkout@v4

      - name: Download ROM artifact
        uses: actions/download-artifact@v4
        with:
          name: star-crew-64-rom
          path: artifacts/rom

      - name: Download emulator artifact
        uses: actions/download-artifact@v4
        with:
          name: ares-wasm
          path: artifacts/emu

      - name: Stage _site/
        # Layout:
        #   _site/index.html            menu page (web-overlay/index.html)
        #   _site/emulator/             rubens-ares WASM build
        #   _site/tools/                in-browser editors (level + model)
        #   _site/assets/               models + textures (fetched by editors)
        #   _site/rom.z64               game ROM (emulator auto-loads /rom.z64)
        #
        # The emulator's index.html auto-loads /rom.z64 by default; we patch
        # it to fetch /star-crew-64.z64 so the ROM keeps the same name end
        # to end (matches the local build output + the committed artifact
        # in the repo; see .gitignore's !star-crew-64.z64 exception).
        # mobile-debug.js is injected into the emulator page only, where
        # users on phones (no devtools) can see autoload log + JS errors.
        run: |
          set -e
          mkdir -p _site/emulator _site/tools _site/assets
          # Menu at the root.
          cp web-overlay/index.html                _site/index.html
          # Emulator under /emulator/.
          cp artifacts/emu/index.html              _site/emulator/index.html
          cp artifacts/emu/coi-serviceworker.js    _site/emulator/coi-serviceworker.js
          cp artifacts/emu/ares.js                 _site/emulator/ares.js
          cp artifacts/emu/ares.wasm               _site/emulator/ares.wasm
          cp artifacts/emu/ares.data               _site/emulator/ares.data
          cp web-overlay/mobile-debug.js           _site/emulator/mobile-debug.js
          # Editors under /tools/.
          cp -r tools/.                            _site/tools/
          # Assets the editors fetch (e.g. default character model, textures).
          cp -r assets/.                           _site/assets/
          # Built-in levels the level editor can open directly from the app.
          mkdir -p _site/levels
          cp -r levels/.                           _site/levels/
          # ROM at site root under its real build name so the emulator's
          # patched fetch resolves.
          cp artifacts/rom/star-crew-64.z64        _site/star-crew-64.z64
          # Point the emulator's auto-load at the canonical ROM name.
          sed -i 's|/rom\.z64|/star-crew-64.z64|g; s|"rom\.z64"|"star-crew-64.z64"|g' _site/emulator/index.html
          # Inject the debug overlay script just before </body> of the emulator.
          sed -i 's|</body>|<script src="mobile-debug.js"></script>\n</body>|' _site/emulator/index.html
          ls -la _site/
          ls -la _site/emulator/
          ls -la _site/tools/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: package-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
